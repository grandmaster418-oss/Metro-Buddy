<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0e0e0e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Metro Buddy" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="application-name" content="Metro Buddy" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>Metro Buddy — metronome &amp; groove trainer</title>
<style>
  :root {
    --bg: #0e0e0e;
    --panel: #161616;
    --line: #2a2a2a;
    --ink: #e8e6e1;
    --dim: #7a766e;
    --accent: #ff5b1f;
    --accent-soft: #ff8d5c;
    --target: #ffd966;
    --green: #7be09a;
    --rule: #303030;
    --shadow: 0 1px 0 #2c2c2c inset, 0 0 0 1px #000;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body {
    font-family: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    min-height: 100svh;
    overscroll-behavior: none;
    user-select: none; -webkit-user-select: none;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background-image:
      radial-gradient(1200px 600px at 50% -10%, #1a1a1a 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,0.012) 3px 4px);
  }
  .app { max-width: 520px; margin: 0 auto; padding: 18px 16px 28px; }

  header {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 6px 4px 14px; border-bottom: 1px solid var(--rule);
  }
  .logo { font-weight: 700; letter-spacing: 0.18em; font-size: 13px; }
  .logo .slash { color: var(--accent); }
  .meta { font-size: 11px; color: var(--dim); letter-spacing: 0.16em; }

  .display {
    margin-top: 18px;
    background: linear-gradient(180deg, #131313, #0c0c0c);
    border: 1px solid var(--line); border-radius: 14px;
    padding: 18px 18px 14px; box-shadow: var(--shadow);
    position: relative; overflow: hidden;
  }
  .display::after {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(400px 140px at 80% 0%, rgba(255,91,31,0.06), transparent 70%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 3px);
    pointer-events: none;
  }
  .row1 { display: flex; align-items: center; justify-content: space-between; }
  .label-sm { font-size: 10px; letter-spacing: 0.22em; color: var(--dim); }

  .bpm { display: flex; align-items: baseline; gap: 10px; margin-top: 6px; }
  .bpm-num {
    font-size: 88px; line-height: 0.95; font-weight: 700;
    letter-spacing: -0.04em; font-variant-numeric: tabular-nums; color: var(--ink);
    text-shadow: 0 0 30px rgba(255, 91, 31, 0.06);
  }
  .bpm-unit { font-size: 12px; color: var(--dim); letter-spacing: 0.22em; }

  .tempo-row { margin-top: 14px; display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; }
  .stepper {
    width: 44px; height: 44px; background: #0a0a0a;
    border: 1px solid var(--line); color: var(--ink);
    font-size: 22px; border-radius: 10px; cursor: pointer;
    display: grid; place-items: center;
    transition: transform .06s ease, background .15s ease;
  }
  .stepper:active { transform: scale(0.94); background: #050505; }

  input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 32px; background: transparent; }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 4px; background: linear-gradient(90deg, var(--accent), #4a2410);
    border-radius: 2px; border: 1px solid #000;
  }
  input[type="range"]::-moz-range-track {
    height: 4px; background: linear-gradient(90deg, var(--accent), #4a2410);
    border-radius: 2px; border: 1px solid #000;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 22px; height: 28px; margin-top: -13px;
    background: linear-gradient(180deg, #2a2a2a, #111); border: 1px solid #000;
    border-radius: 4px; box-shadow: 0 1px 0 #444 inset, 0 4px 8px rgba(0,0,0,0.5);
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px; height: 28px; background: linear-gradient(180deg, #2a2a2a, #111);
    border: 1px solid #000; border-radius: 4px; cursor: pointer;
  }

  .ctrl-grid { margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .pill {
    background: #0a0a0a; border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px;
  }
  .pill .k { font-size: 10px; letter-spacing: 0.22em; color: var(--dim); display:block; margin-bottom: 6px; }
  .seg { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 0; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .seg button {
    background: transparent; border: none; color: var(--dim);
    font-family: inherit; font-size: 11px; letter-spacing: 0.14em;
    padding: 8px 4px; cursor: pointer;
  }
  .seg button + button { border-left: 1px solid var(--line); }
  .seg button.active { background: var(--accent); color: #1a0a02; font-weight: 700; }

  .toggle-pill {
    display: flex; align-items: center; justify-content: space-between;
    background: #0a0a0a; border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px; cursor: pointer; color: var(--ink);
    font-family: inherit; width: 100%;
  }
  .toggle-pill .k { font-size: 10px; letter-spacing: 0.22em; color: var(--dim); margin: 0; }
  .toggle-pill .v { font-size: 13px; letter-spacing: 0.16em; }
  .toggle-pill[data-on="true"] .v { color: var(--accent); }

  .beats { margin-top: 14px; display: grid; grid-template-columns: repeat(var(--steps, 4), 1fr); gap: 6px; }
  .beat { height: 10px; background: #0a0a0a; border: 1px solid var(--line); border-radius: 3px; transition: background .08s ease; }
  .beat.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 14px rgba(255,91,31,0.4); }
  .beat.downbeat { border-color: #4a4a4a; }
  .beat.beat-one { border-color: var(--target); }

  .transport { margin-top: 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn {
    height: 64px; border-radius: 14px; border: 1px solid var(--line);
    background: linear-gradient(180deg, #1c1c1c, #101010); color: var(--ink);
    font-family: inherit; font-size: 13px; letter-spacing: 0.22em; font-weight: 600;
    cursor: pointer; box-shadow: var(--shadow); display: grid; place-items: center;
    transition: transform .05s ease, background .15s ease;
  }
  .btn:active { transform: scale(0.98); }
  .btn.primary {
    background: linear-gradient(180deg, var(--accent), #c83f0e);
    color: #1a0a02; border-color: #2a0d00;
    text-shadow: 0 1px 0 rgba(255,255,255,0.2);
  }
  .btn.primary[data-playing="true"] { background: linear-gradient(180deg, #2a2a2a, #141414); color: var(--ink); }

  .section {
    margin-top: 22px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 14px; box-shadow: var(--shadow);
  }
  .section h2 {
    margin: 0 0 12px; font-size: 11px; letter-spacing: 0.28em; color: var(--dim); font-weight: 600;
    display: flex; align-items: center; justify-content: space-between;
  }
  .section h2 .led {
    width: 8px; height: 8px; border-radius: 50%;
    background: #2a2a2a; box-shadow: 0 0 0 1px #000 inset;
    transition: background .1s ease;
  }
  .section h2 .led.on { background: var(--green); box-shadow: 0 0 10px var(--green); }

  .pattern-row { display: grid; grid-template-columns: 56px 1fr; gap: 10px; align-items: center; }
  .pattern-row + .pattern-row { margin-top: 8px; }
  .track-name { font-size: 10px; letter-spacing: 0.2em; color: var(--dim); text-align: right; padding-right: 4px; }
  .track-name.target-name { color: var(--target); }
  .steps { display: grid; gap: 4px; }
  .step {
    aspect-ratio: 1 / 1; background: #0a0a0a;
    border: 1px solid var(--line); border-radius: 3px;
    cursor: pointer; transition: background .08s ease, transform .05s ease;
    position: relative;
  }
  .step.beat-start { border-color: #383838; }
  .step.beat-one { border-color: var(--target); border-width: 2px; }
  .step.on { background: #4a4a4a; border-color: #6a6a6a; }
  .step.on.target { background: var(--target); border-color: #fff5cc; box-shadow: 0 0 10px rgba(255,217,102,0.5); }
  .step.on.kick { background: #d6d2c8; border-color: #fff; }
  .step.on.snare { background: var(--accent-soft); border-color: var(--accent); }
  .step.on.hat { background: #8aa0d6; border-color: #b8c8ee; }
  .step.playhead::after {
    content: ""; position: absolute; inset: -2px;
    border: 1.5px solid var(--accent); border-radius: 4px; pointer-events: none;
  }
  .step:active { transform: scale(0.9); }

  .count-row {
    display: grid; gap: 4px; margin-top: 6px;
    margin-left: 66px;
  }
  .count {
    font-size: 9px; letter-spacing: 0.06em; color: var(--dim);
    text-align: center; font-variant-numeric: tabular-nums;
  }
  .count.beat { color: var(--ink); font-weight: 700; }
  .count.beat-one { color: var(--target); }

  .preset-row { margin-top: 14px; display: flex; gap: 6px; flex-wrap: wrap; }
  .preset {
    flex: 1; min-width: 70px; padding: 8px 10px;
    background: #0a0a0a; border: 1px solid var(--line); border-radius: 8px;
    color: var(--ink); font-family: inherit;
    font-size: 10px; letter-spacing: 0.18em; cursor: pointer;
  }
  .preset:active { background: #050505; }
  .preset.active { border-color: var(--accent); color: var(--accent); }

  .clear-btn {
    margin-top: 10px; width: 100%; padding: 8px;
    background: transparent; border: 1px dashed var(--line); border-radius: 6px;
    color: var(--dim); font-family: inherit; font-size: 10px; letter-spacing: 0.2em;
    cursor: pointer;
  }
  .clear-btn:active { background: #050505; }

  .footer {
    margin-top: 20px; padding: 10px 4px;
    font-size: 10px; letter-spacing: 0.2em; color: var(--dim);
    display: flex; justify-content: space-between;
  }

  @keyframes flash { 0% { background: var(--accent); } 100% { background: #0a0a0a; } }
  .toggle-pill.flash { animation: flash .25s ease-out; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">METRO<span class="slash">/</span>BUDDY</div>
    <div class="meta">v0.3 · TRAINER</div>
  </header>

  <section class="display">
    <div class="row1">
      <span class="label-sm">TEMPO</span>
      <span class="label-sm" id="tempoMark">— MODERATO</span>
    </div>
    <div class="bpm">
      <span class="bpm-num" id="bpmNum">100</span>
      <span class="bpm-unit">BPM</span>
    </div>

    <div class="tempo-row">
      <button class="stepper" id="bpmDown">−</button>
      <input type="range" id="bpmSlider" min="30" max="280" value="100" />
      <button class="stepper" id="bpmUp">+</button>
    </div>

    <div class="ctrl-grid">
      <div class="pill">
        <span class="k">METER</span>
        <div class="seg" id="meterSeg">
          <button data-meter="4-4" class="active">4/4</button>
          <button data-meter="6-8">6/8</button>
        </div>
      </div>
      <div class="pill">
        <span class="k">CLICK SUB</span>
        <div class="seg" id="subSeg">
          <button data-sub="1" class="active">1</button>
          <button data-sub="2">8TH</button>
          <button data-sub="4">16TH</button>
        </div>
      </div>
    </div>

    <div class="ctrl-grid">
      <button class="toggle-pill" id="halfTimeBtn" data-on="false">
        <span class="k">FEEL</span>
        <span class="v" id="halfTimeVal">STRAIGHT</span>
      </button>
      <button class="toggle-pill" id="tapBtn">
        <span class="k">TAP</span>
        <span class="v">TAP</span>
      </button>
    </div>

    <div class="beats" id="beats" style="--steps:4"></div>
  </section>

  <div class="transport">
    <button class="btn primary" id="playBtn" data-playing="false">PLAY</button>
    <button class="btn" id="metroBtn" data-on="true">CLICK · ON</button>
  </div>

  <section class="section">
    <h2>
      <span id="grooveTitle">GROOVE · 16 STEP</span>
      <span class="led" id="grooveLed"></span>
    </h2>

    <div id="grooveGrid"></div>
    <div class="count-row" id="countRow"></div>

    <div class="preset-row" id="presetRow"></div>

    <button class="clear-btn" id="clearTargetBtn">CLEAR TARGET TRACK</button>
  </section>

  <div class="footer">
    <span>WEB AUDIO · OFFLINE READY</span>
    <span id="statusDot">IDLE</span>
  </div>
</div>

<script>
(() => {

  const meterDefs = {
    '4-4': {
      steps: 16, gridCols: 16, beatsPerBar: 4,
      mainPulseEvery: 4, eighthEvery: 2, stepsPerVisualBeat: 4,
      downbeatBeats: [0],
      countLabels: ['1','e','&','a','2','e','&','a','3','e','&','a','4','e','&','a'],
      beatStarts: [0,4,8,12],
    },
    '6-8': {
      steps: 12, gridCols: 12, beatsPerBar: 6,
      mainPulseEvery: 6, eighthEvery: 2, stepsPerVisualBeat: 2,
      downbeatBeats: [0, 3],
      countLabels: ['1','&','2','&','3','&','4','&','5','&','6','&'],
      beatStarts: [0,2,4,6,8,10],
    },
  };

  const presets = {
    '4-4': {
      straight: {
        off:    { kick: [], snare: [], hat: [], target: [] },
        rock:   { kick: [0,8],     snare: [4,12], hat: [0,2,4,6,8,10,12,14], target: [] },
        funk:   { kick: [0,6,10],  snare: [4,12], hat: [0,2,3,4,6,8,10,11,12,14], target: [] },
        hiphop: { kick: [0,7,10],  snare: [4,12], hat: [0,2,4,6,8,10,12,14], target: [] },
        bossa:  { kick: [0,6,10],  snare: [3,10,13], hat: [0,2,4,6,8,10,12,14], target: [] },
        ccm:    { kick: [0,8,10],  snare: [4,12], hat: [0,2,4,6,8,10,12,14], target: [] },
      },
      halftime: {
        off:    { kick: [], snare: [], hat: [], target: [] },
        rock:   { kick: [0,10],    snare: [8],    hat: [0,2,4,6,8,10,12,14], target: [] },
        funk:   { kick: [0,3,10],  snare: [8],    hat: [0,2,4,6,8,10,12,14], target: [] },
        hiphop: { kick: [0,6,10],  snare: [8],    hat: [0,4,8,12], target: [] },
        bossa:  { kick: [0,6,10],  snare: [8,13], hat: [0,2,4,6,8,10,12,14], target: [] },
        ccm:    { kick: [0,3,10],  snare: [8],    hat: [0,2,4,6,8,10,12,14], target: [] },
      },
    },
    '6-8': {
      straight: {
        off:    { kick: [], snare: [], hat: [], target: [] },
        rock:   { kick: [0],     snare: [6],   hat: [0,2,4,6,8,10], target: [] },
        funk:   { kick: [0,4],   snare: [6],   hat: [0,2,4,6,8,10], target: [] },
        hiphop: { kick: [0,8],   snare: [6],   hat: [0,2,4,6,8,10], target: [] },
        bossa:  { kick: [0,6],   snare: [2,8], hat: [0,2,4,6,8,10], target: [] },
        ccm:    { kick: [0,4],   snare: [6],   hat: [0,2,4,6,8,10], target: [] },
      },
      halftime: {
        off:    { kick: [], snare: [], hat: [], target: [] },
        rock:   { kick: [0],     snare: [6],   hat: [0,4,8], target: [] },
        funk:   { kick: [0,8],   snare: [6],   hat: [0,4,8], target: [] },
        hiphop: { kick: [0,8],   snare: [6],   hat: [0,4,8], target: [] },
        bossa:  { kick: [0,6],   snare: [4,10],hat: [0,4,8], target: [] },
        ccm:    { kick: [0,8],   snare: [6],   hat: [0,4,8], target: [] },
      },
    },
  };

  const presetOrder = ['off','rock','funk','hiphop','bossa','ccm'];
  const presetLabels = { off:'OFF', rock:'ROCK', funk:'FUNK', hiphop:'HIP-HOP', bossa:'BOSSA', ccm:'CCM' };

  const tempoMarks = [
    [40,'GRAVE'],[60,'LARGO'],[76,'ADAGIO'],[108,'ANDANTE'],
    [120,'MODERATO'],[156,'ALLEGRO'],[176,'VIVACE'],[200,'PRESTO'],[999,'PRESTISSIMO']
  ];

  const state = {
    bpm: 100, meter: '4-4', halfTime: false, clickSub: 1,
    metroOn: true, playing: false,
    pattern: { kick: [], snare: [], hat: [], target: [] },
    activePreset: 'off',
  };

  const $ = id => document.getElementById(id);
  const bpmNum = $('bpmNum'), bpmSlider = $('bpmSlider'), tempoMark = $('tempoMark');
  const beatsEl = $('beats'), playBtn = $('playBtn'), metroBtn = $('metroBtn');
  const grooveGrid = $('grooveGrid'), grooveLed = $('grooveLed'), grooveTitle = $('grooveTitle');
  const statusDot = $('statusDot'), tapBtn = $('tapBtn');
  const halfTimeBtn = $('halfTimeBtn'), halfTimeVal = $('halfTimeVal');
  const presetRow = $('presetRow'), countRow = $('countRow');

  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint:'interactive' });
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playBeatOne(time) {
    const ctx = audioCtx;
    const osc1 = ctx.createOscillator(), osc2 = ctx.createOscillator();
    const gain = ctx.createGain();
    osc1.frequency.value = 2400; osc2.frequency.value = 3200;
    osc1.type = 'sine'; osc2.type = 'sine';
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.exponentialRampToValueAtTime(0.6, time + 0.001);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.12);
    osc1.connect(gain); osc2.connect(gain); gain.connect(ctx.destination);
    osc1.start(time); osc2.start(time);
    osc1.stop(time + 0.13); osc2.stop(time + 0.13);
  }
  function playClick(time, level) {
    const ctx = audioCtx;
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    let freq, vol, dur;
    if (level === 'mid') { freq = 1100; vol = 0.30; dur = 0.035; }
    else                 { freq = 900;  vol = 0.10; dur = 0.025; }
    osc.frequency.value = freq; osc.type = 'square';
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.exponentialRampToValueAtTime(vol, time + 0.001);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(time); osc.stop(time + dur + 0.01);
  }
  function playTarget(time) {
    const ctx = audioCtx;
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(1500, time);
    osc.frequency.exponentialRampToValueAtTime(900, time + 0.05);
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.exponentialRampToValueAtTime(0.5, time + 0.001);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.08);
    osc.connect(gain).connect(ctx.destination);
    osc.start(time); osc.stop(time + 0.09);
  }
  function playKick(time) {
    const ctx = audioCtx;
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.frequency.setValueAtTime(140, time);
    osc.frequency.exponentialRampToValueAtTime(40, time + 0.12);
    gain.gain.setValueAtTime(0.9, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.35);
    osc.connect(gain).connect(ctx.destination);
    osc.start(time); osc.stop(time + 0.4);
  }
  function playSnare(time) {
    const ctx = audioCtx;
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.2, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i=0;i<data.length;i++) data[i] = Math.random()*2-1;
    const noise = ctx.createBufferSource(); noise.buffer = buf;
    const filt = ctx.createBiquadFilter(); filt.type='highpass'; filt.frequency.value=1500;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0.6, time);
    ng.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
    noise.connect(filt).connect(ng).connect(ctx.destination);
    noise.start(time); noise.stop(time + 0.2);
    const osc = ctx.createOscillator(), og = ctx.createGain();
    osc.frequency.value = 200;
    og.gain.setValueAtTime(0.4, time);
    og.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    osc.connect(og).connect(ctx.destination);
    osc.start(time); osc.stop(time + 0.12);
  }
  function playHat(time) {
    const ctx = audioCtx;
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i=0;i<data.length;i++) data[i] = Math.random()*2-1;
    const noise = ctx.createBufferSource(); noise.buffer = buf;
    const filt = ctx.createBiquadFilter(); filt.type='highpass'; filt.frequency.value=7000;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.25, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
    noise.connect(filt).connect(g).connect(ctx.destination);
    noise.start(time); noise.stop(time + 0.06);
  }

  let currentStep = 0, nextNoteTime = 0, timerId = null;
  const lookahead = 25.0, scheduleAhead = 0.1;

  function sixteenthDuration() {
    if (state.meter === '6-8') return (60.0 / state.bpm) / 2;
    return 60.0 / state.bpm / 4;
  }

  function scheduleStep(stepIndex, time) {
    const m = meterDefs[state.meter];
    if (state.metroOn) {
      const isBeatOne = stepIndex === 0;
      const isOtherBeat = m.beatStarts.includes(stepIndex) && !isBeatOne;
      const isEighth = (stepIndex % m.eighthEvery) === 0;

      if (isBeatOne) playBeatOne(time);
      else if (isOtherBeat) playClick(time, 'mid');
      else if (state.clickSub >= 2 && isEighth) playClick(time, 'mid');
      else if (state.clickSub >= 4) playClick(time, 'soft');
    }
    if (state.pattern.target[stepIndex]) playTarget(time);
    if (state.pattern.kick[stepIndex])   playKick(time);
    if (state.pattern.snare[stepIndex])  playSnare(time);
    if (state.pattern.hat[stepIndex])    playHat(time);

    const uiAt = (time - audioCtx.currentTime) * 1000;
    setTimeout(() => updatePlayheadUI(stepIndex), Math.max(0, uiAt));
  }

  function tick() {
    const totalSteps = meterDefs[state.meter].steps;
    while (nextNoteTime < audioCtx.currentTime + scheduleAhead) {
      scheduleStep(currentStep, nextNoteTime);
      nextNoteTime += sixteenthDuration();
      currentStep = (currentStep + 1) % totalSteps;
    }
    timerId = setTimeout(tick, lookahead);
  }

  function start() {
    ensureAudio();
    state.playing = true;
    currentStep = 0;
    nextNoteTime = audioCtx.currentTime + 0.05;
    playBtn.textContent = 'STOP';
    playBtn.dataset.playing = 'true';
    statusDot.textContent = 'RUN';
    grooveLed.classList.add('on');
    tick();
  }
  function stop() {
    state.playing = false;
    if (timerId) clearTimeout(timerId);
    timerId = null;
    playBtn.textContent = 'PLAY';
    playBtn.dataset.playing = 'false';
    statusDot.textContent = 'IDLE';
    grooveLed.classList.remove('on');
    document.querySelectorAll('.step.playhead').forEach(e => e.classList.remove('playhead'));
    document.querySelectorAll('.beat.active').forEach(e => e.classList.remove('active'));
  }

  function setBPM(v) {
    v = Math.max(30, Math.min(280, Math.round(v)));
    state.bpm = v; bpmNum.textContent = v; bpmSlider.value = v;
    for (const [thr,name] of tempoMarks) if (v < thr) { tempoMark.textContent = '— ' + name; break; }
  }
  bpmSlider.addEventListener('input', e => setBPM(+e.target.value));
  $('bpmDown').addEventListener('click', () => setBPM(state.bpm - 1));
  $('bpmUp').addEventListener('click', () => setBPM(state.bpm + 1));
  function holdRepeat(el, fn) {
    let t1, t2;
    const start = e => { e.preventDefault(); fn(); t1 = setTimeout(()=>{ t2 = setInterval(fn, 60); },350); };
    const end = () => { clearTimeout(t1); clearInterval(t2); };
    el.addEventListener('pointerdown', start);
    el.addEventListener('pointerup', end);
    el.addEventListener('pointerleave', end);
    el.addEventListener('pointercancel', end);
  }
  holdRepeat($('bpmDown'), () => setBPM(state.bpm - 1));
  holdRepeat($('bpmUp'),   () => setBPM(state.bpm + 1));

  $('meterSeg').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    document.querySelectorAll('#meterSeg button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state.meter = b.dataset.meter;
    grooveTitle.textContent = state.meter === '6-8' ? 'GROOVE · 12 STEP (6/8)' : 'GROOVE · 16 STEP';
    applyPreset(state.activePreset);
    renderBeatIndicator();
    renderCountRow();
    if (state.playing) { stop(); start(); }
  });
  $('subSeg').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    document.querySelectorAll('#subSeg button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state.clickSub = +b.dataset.sub;
  });
  halfTimeBtn.addEventListener('click', () => {
    state.halfTime = !state.halfTime;
    halfTimeBtn.dataset.on = state.halfTime;
    halfTimeVal.textContent = state.halfTime ? 'HALF-TIME' : 'STRAIGHT';
    applyPreset(state.activePreset);
  });

  function renderBeatIndicator() {
    const m = meterDefs[state.meter];
    beatsEl.style.setProperty('--steps', m.beatsPerBar);
    beatsEl.innerHTML = '';
    for (let i=0; i<m.beatsPerBar; i++) {
      const d = document.createElement('div');
      d.className = 'beat';
      if (i === 0) d.classList.add('beat-one');
      else if (m.downbeatBeats.includes(i)) d.classList.add('downbeat');
      beatsEl.appendChild(d);
    }
  }

  function renderCountRow() {
    const m = meterDefs[state.meter];
    countRow.innerHTML = '';
    countRow.style.gridTemplateColumns = `repeat(${m.gridCols}, 1fr)`;
    m.countLabels.forEach((label, i) => {
      const c = document.createElement('div');
      c.className = 'count';
      if (m.beatStarts.includes(i)) c.classList.add('beat');
      if (i === 0) c.classList.add('beat-one');
      c.textContent = label;
      countRow.appendChild(c);
    });
  }

  const tracks = [
    { key:'target', label:'TGT',  className:'target-name' },
    { key:'kick',   label:'KCK',  className:'' },
    { key:'snare',  label:'SNR',  className:'' },
    { key:'hat',    label:'HAT',  className:'' },
  ];
  function renderGroove() {
    const m = meterDefs[state.meter];
    grooveGrid.innerHTML = '';
    for (const t of tracks) {
      const row = document.createElement('div');
      row.className = 'pattern-row';
      const name = document.createElement('div');
      name.className = 'track-name ' + t.className; name.textContent = t.label;
      const stepsEl = document.createElement('div');
      stepsEl.className = 'steps';
      stepsEl.style.gridTemplateColumns = `repeat(${m.gridCols}, 1fr)`;
      for (let i=0; i<m.steps; i++) {
        const s = document.createElement('div');
        s.className = 'step ' + t.key;
        if (m.beatStarts.includes(i)) s.classList.add('beat-start');
        if (i === 0) s.classList.add('beat-one');
        if (state.pattern[t.key][i]) s.classList.add('on');
        s.dataset.track = t.key; s.dataset.idx = i;
        s.addEventListener('click', () => {
          state.pattern[t.key][i] = !state.pattern[t.key][i];
          s.classList.toggle('on');
          if (t.key !== 'target') setActivePreset(null);
        });
        stepsEl.appendChild(s);
      }
      row.appendChild(name); row.appendChild(stepsEl);
      grooveGrid.appendChild(row);
    }
  }

  function updatePlayheadUI(stepIndex) {
    if (!state.playing) return;
    document.querySelectorAll('.step.playhead').forEach(e => e.classList.remove('playhead'));
    document.querySelectorAll(`.step[data-idx="${stepIndex}"]`).forEach(e => e.classList.add('playhead'));

    const m = meterDefs[state.meter];
    if (stepIndex % m.stepsPerVisualBeat === 0) {
      const beatIdx = stepIndex / m.stepsPerVisualBeat;
      const all = beatsEl.querySelectorAll('.beat');
      all.forEach(b => b.classList.remove('active'));
      if (all[beatIdx]) {
        all[beatIdx].classList.add('active');
        setTimeout(() => all[beatIdx] && all[beatIdx].classList.remove('active'), 90);
      }
    }
  }

  function buildPresetRow() {
    presetRow.innerHTML = '';
    for (const k of presetOrder) {
      const b = document.createElement('button');
      b.className = 'preset'; b.dataset.preset = k; b.textContent = presetLabels[k];
      b.addEventListener('click', () => applyPreset(k));
      presetRow.appendChild(b);
    }
  }
  function applyPreset(name) {
    if (!name) name = 'off';
    const feel = state.halfTime ? 'halftime' : 'straight';
    const p = presets[state.meter][feel][name];
    const m = meterDefs[state.meter];
    const savedTarget = state.pattern.target.slice();
    for (const t of ['kick','snare','hat']) {
      state.pattern[t] = Array(m.steps).fill(false);
      for (const i of (p[t] || [])) if (i < m.steps) state.pattern[t][i] = true;
    }
    if (savedTarget.length !== m.steps) {
      state.pattern.target = Array(m.steps).fill(false);
    } else {
      state.pattern.target = savedTarget;
    }
    setActivePreset(name);
    renderGroove();
  }
  function setActivePreset(name) {
    state.activePreset = name;
    document.querySelectorAll('.preset').forEach(b => {
      b.classList.toggle('active', b.dataset.preset === name);
    });
  }

  $('clearTargetBtn').addEventListener('click', () => {
    const m = meterDefs[state.meter];
    state.pattern.target = Array(m.steps).fill(false);
    renderGroove();
  });

  playBtn.addEventListener('click', () => state.playing ? stop() : start());
  metroBtn.addEventListener('click', () => {
    state.metroOn = !state.metroOn;
    metroBtn.textContent = 'CLICK · ' + (state.metroOn ? 'ON' : 'OFF');
    metroBtn.dataset.on = state.metroOn;
  });

  let taps = [];
  tapBtn.addEventListener('click', () => {
    const now = performance.now();
    taps = taps.filter(t => now - t < 2500);
    taps.push(now);
    tapBtn.classList.remove('flash'); void tapBtn.offsetWidth; tapBtn.classList.add('flash');
    if (taps.length >= 2) {
      const intervals = [];
      for (let i=1;i<taps.length;i++) intervals.push(taps[i]-taps[i-1]);
      const avg = intervals.reduce((a,b)=>a+b,0)/intervals.length;
      setBPM(60000/avg);
    }
  });

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); state.playing ? stop() : start(); }
    else if (e.key === 'ArrowUp')   setBPM(state.bpm + (e.shiftKey ? 5 : 1));
    else if (e.key === 'ArrowDown') setBPM(state.bpm - (e.shiftKey ? 5 : 1));
    else if (e.key.toLowerCase() === 'm') metroBtn.click();
    else if (e.key.toLowerCase() === 't') tapBtn.click();
    else if (e.key.toLowerCase() === 'h') halfTimeBtn.click();
  });

  buildPresetRow();
  setBPM(100);
  renderBeatIndicator();
  renderCountRow();
  state.pattern = { kick: [], snare: [], hat: [], target: [] };
  applyPreset('off');

  let wakeLock = null;
  async function requestWakeLock() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch {}
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && state.playing) requestWakeLock();
  });
  playBtn.addEventListener('click', () => { if (state.playing) requestWakeLock(); });

  // service worker registration
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => {
        console.warn('SW registration failed:', err);
      });
    });
  }

})();
</script>
</body>
</html>
